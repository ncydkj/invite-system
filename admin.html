<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>黄金酱酒 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#e8d5a8;--dark:#1a1208;--dark2:#2a1f10;--red:#b22222;--green:#2d6a2e;--bg:#0f0a04;--card:#1e150a;--text:#f0e6d3;--muted:#8a7a62;--border:#3a2e1e}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}

#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1e150a 0%,#0f0a04 70%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 36px;width:340px;text-align:center}
.login-box h1{font-size:22px;color:var(--gold);margin-bottom:8px;font-weight:600}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:32px}
.login-box input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:16px;outline:none;margin-bottom:14px;transition:border .2s}
.login-box input:focus{border-color:var(--gold)}
.login-box button{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#c9a96e,#a07c3a);color:#1a1208;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s}
.login-box button:active{transform:scale(.97)}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}

#dashPage{display:none;flex-direction:column;min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:16px;color:var(--gold);white-space:nowrap}
.top-bar-right{display:flex;align-items:center;gap:8px}
.stats-row{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}
.stat-card{flex:1;min-width:90px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-card .num{font-size:24px;font-weight:700;color:var(--gold)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.form-section{padding:12px 16px}
.form-row{display:flex;gap:8px;flex-wrap:wrap}
.form-row input{flex:1;min-width:0;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:16px;outline:none}
.form-row input:focus{border-color:var(--gold)}
.btn-gold{padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#c9a96e,#a07c3a);color:#1a1208;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-gold:active{transform:scale(.97)}
.btn-sm{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--gold);font-size:12px;cursor:pointer;white-space:nowrap}
.btn-sm.danger{color:var(--red);border-color:#5a2020}
.btn-sm:active{opacity:.7}

.list-section{padding:0 16px 16px;flex:1;overflow-y:auto}
.list-section h3{font-size:14px;color:var(--muted);margin-bottom:8px;font-weight:400}
.table-wrap{display:none;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:var(--dark2);color:var(--gold);padding:10px 12px;text-align:left;font-weight:500;white-space:nowrap}
.table-wrap td{padding:10px 12px;border-top:1px solid var(--border);vertical-align:middle}
.table-wrap tr:hover td{background:rgba(201,169,110,.05)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge.valid{background:rgba(45,106,46,.2);color:#6aaa50;border:1px solid #2d6a2e}
.badge.used{background:rgba(178,34,34,.2);color:#e06060;border:1px solid #5a2020}

.card-list{display:flex;flex-direction:column;gap:10px}
.invite-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.invite-card .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.invite-card .card-name{font-size:15px;font-weight:600;color:var(--text)}
.invite-card .card-company{font-size:12px;color:var(--muted);margin-top:2px}
.invite-card .card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.invite-card .card-actions{display:flex;gap:6px}

.scan-btn{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#c9a96e,#a07c3a);border:none;color:#1a1208;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(201,169,110,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.scan-btn:active{transform:scale(.9)}

#scanOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;flex-direction:column}
.scan-header{display:flex;justify-content:space-between;align-items:center;padding:16px;color:#fff}
.scan-header h2{font-size:16px;color:var(--gold)}
.scan-close{background:none;border:1px solid var(--border);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer}
#reader{width:100%;max-width:360px;margin:0 auto}
#scanResult{margin:16px;padding:16px;border-radius:10px;font-size:15px;text-align:center;display:none}
#scanResult.success{background:rgba(45,106,46,.15);border:1px solid var(--green);color:#6aaa50}
#scanResult.error{background:rgba(178,34,34,.15);border:1px solid var(--red);color:#e06060}

.manual-section{padding:16px;text-align:center}
.manual-section input{width:100%;max-width:260px;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:16px;text-align:center;letter-spacing:4px;outline:none;margin:8px 0}
.manual-section .btn-gold{margin-top:8px}

@media(min-width:640px){
  .form-row{flex-wrap:nowrap}
  .card-list{display:none}
  .table-wrap{display:block}
}
@media(max-width:639px){
  .table-wrap{display:none!important}
  .card-list{display:flex!important}
}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);color:var(--gold);padding:10px 24px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage">
  <div class="login-box">
    <h1>黄金酱酒 · 管理后台</h1>
    <p>流金之夜品鉴会 邀请函管理</p>
    <input type="text" id="loginUser" placeholder="账号" autocomplete="off">
    <input type="password" id="loginPass" placeholder="密码" autocomplete="off">
    <button onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError">账号或密码错误</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashPage">
  <div class="top-bar">
    <h1>📋 邀请函管理</h1>
    <div class="top-bar-right">
      <button class="btn-sm" onclick="refreshList()">🔄 刷新</button>
      <button class="btn-sm danger" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">总邀请</div></div>
    <div class="stat-card"><div class="num" id="statValid">0</div><div class="lbl">待核销</div></div>
    <div class="stat-card"><div class="num" id="statUsed">0</div><div class="lbl">已核销</div></div>
  </div>

  <div class="form-section">
    <div class="form-row">
      <input type="text" id="inputName" placeholder="嘉宾姓名（必填）">
      <input type="text" id="inputCompany" placeholder="公司（选填）">
      <button class="btn-gold" onclick="createInvite()">生成邀请函</button>
    </div>
  </div>

  <div class="list-section">
    <h3 id="listTitle">邀请函列表</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>邀请码</th><th>姓名</th><th>公司</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>

  <button class="scan-btn" onclick="openScan()">📷</button>
</div>

<!-- Scan Overlay -->
<div id="scanOverlay">
  <div class="scan-header">
    <h2>扫码核销</h2>
    <button class="scan-close" onclick="closeScan()">关闭</button>
  </div>
  <div id="reader"></div>
  <div id="scanResult"></div>
  <div class="manual-section">
    <p style="color:#8a7a62;font-size:13px;margin-bottom:8px">扫描困难？手动输入邀请码</p>
    <input type="text" id="manualInput" placeholder="如 HJ8N3K" maxlength="6">
    <button class="btn-gold" onclick="manualVerify()">手动核销</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
// ===== Upstash Redis REST API (direct from browser) =====
const R_URL = 'https://arriving-buck-124112.upstash.io';
const R_TOK = 'gQAAAAAAAeTQAAIgcDI4NmZiZGVkZTQzMzI0MDcwYjAxMjZhOTE1MTc3MTA0MA';

// Robust redis GET (all reads use GET)
async function redisGet(path) {
  const url = R_URL + path;
  const r = await fetch(url, {
    method: 'GET',
    headers: { Authorization: 'Bearer ' + R_TOK }
  });
  const j = await r.json();
  console.log('[redisGet]', path, j);
  if (typeof j.result === 'string') {
    try { return JSON.parse(j.result); } catch { return j.result; }
  }
  return j.result;
}

// redis SET via GET with encodeURIComponent (reliable UTF-8 for Chinese)
async function redisSet(key, value) {
  const val = JSON.stringify(value);
  const encoded = encodeURIComponent(val);
  const url = R_URL + '/set/' + key + '/' + encoded;
  const r = await fetch(url, {
    method: 'GET',
    headers: { Authorization: 'Bearer ' + R_TOK }
  });
  const j = await r.json();
  console.log('[redisSet]', key, j);
  return j.result;
}

// redis SADD (set add)
async function redisSAdd(key, member) {
  const url = R_URL + '/sadd/' + key + '/' + encodeURIComponent(member);
  const r = await fetch(url, {
    method: 'GET',
    headers: { Authorization: 'Bearer ' + R_TOK }
  });
  const j = await r.json();
  console.log('[redisSAdd]', key, member, j);
  return j.result;
}

// redis DEL
async function redisDel(key) {
  const url = R_URL + '/del/' + key;
  const r = await fetch(url, {
    method: 'GET',
    headers: { Authorization: 'Bearer ' + R_TOK }
  });
  return (await r.json()).result;
}

// redis SREM (set remove)
async function redisSRem(key, member) {
  const url = R_URL + '/srem/' + key + '/' + encodeURIComponent(member);
  const r = await fetch(url, {
    method: 'GET',
    headers: { Authorization: 'Bearer ' + R_TOK }
  });
  return (await r.json()).result;
}

// ===== State =====
let html5Qrcode = null;
let scanning = false;

// ===== Auth =====
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (u === 'admin' && p === '123123') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashPage').style.display = 'flex';
    refreshList();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
function doLogout() {
  document.getElementById('dashPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin();
});

// ===== Helpers =====
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = 'HJ';
  for (let i = 0; i < 4; i++) id += c[Math.floor(Math.random() * c.length)];
  return id;
}

// ===== CRUD =====
async function refreshList() {
  try {
    const keys = await redisGet('/smembers/invite:all') || [];
    const items = [];
    for (const k of keys) {
      const data = await redisGet('/get/invite:' + k);
      if (data) items.push(data);
    }
    items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    renderTable(items);
    renderCards(items);
    updateStats(items);
  } catch(e) {
    console.error('refreshList error:', e);
    showToast('网络错误，请重试');
  }
}

function updateStats(list) {
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('statValid').textContent = list.filter(i => !i.used).length;
  document.getElementById('statUsed').textContent = list.filter(i => i.used).length;
  document.getElementById('listTitle').textContent = `邀请函列表（${list.length}）`;
}

function renderTable(list) {
  const tbody = document.getElementById('tableBody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">暂无邀请函，请点击上方「生成邀请函」</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(it => `
    <tr>
      <td style="color:var(--gold);font-weight:600;letter-spacing:1px">${escHtml(it.id)}</td>
      <td>${escHtml(it.name)}</td>
      <td style="color:var(--muted)">${escHtml(it.company || '-')}</td>
      <td><span class="badge ${it.used ? 'used' : 'valid'}">${it.used ? '已核销' : '有效'}</span></td>
      <td style="color:var(--muted);font-size:12px">${formatTime(it.createdAt)}</td>
      <td>
        ${!it.used ? `<button class="btn-sm" onclick="copyLink('${escHtml(it.id)}')">复制链接</button>` : ''}
        <button class="btn-sm danger" onclick="deleteInvite('${escHtml(it.id)}')">删除</button>
      </td>
    </tr>
  `).join('');
}

function renderCards(list) {
  const el = document.getElementById('cardList');
  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px">暂无邀请函</div>';
    return;
  }
  el.innerHTML = list.map(it => `
    <div class="invite-card">
      <div class="card-top">
        <div>
          <div class="card-name">${escHtml(it.name)}</div>
          <div class="card-company">${escHtml(it.company || '-')}</div>
        </div>
        <span class="badge ${it.used ? 'used' : 'valid'}">${it.used ? '已核销' : '有效'}</span>
      </div>
      <div class="card-bottom">
        <span style="color:var(--gold);font-size:13px;letter-spacing:1px">${escHtml(it.id)}</span>
        <div class="card-actions">
          ${!it.used ? `<button class="btn-sm" onclick="copyLink('${escHtml(it.id)}')">复制链接</button>` : ''}
          <button class="btn-sm danger" onclick="deleteInvite('${escHtml(it.id)}')">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function createInvite() {
  const name = document.getElementById('inputName').value.trim();
  const company = document.getElementById('inputCompany').value.trim();
  if (!name) return showToast('请输入嘉宾姓名');

  const id = genId();
  const invite = { id, name, company, createdAt: new Date().toISOString(), used: false, usedAt: null };

  try {
    // Save invite object
    const setResult = await redisSet('invite:' + id, invite);
    console.log('[createInvite] setResult:', setResult);
    // Add to all set
    await redisSAdd('invite:all', id);
    document.getElementById('inputName').value = '';
    document.getElementById('inputCompany').value = '';
    showToast(`✅ 已生成：${id} · ${name}`);
    refreshList();
  } catch(e) {
    console.error('[createInvite] error:', e);
    showToast('创建失败，请重试');
  }
}

async function deleteInvite(id) {
  if (!confirm(`确认删除邀请函 ${id}？`)) return;
  try {
    await redisDel('invite:' + id);
    await redisSRem('invite:all', id);
    showToast('已删除');
    refreshList();
  } catch(e) {
    showToast('删除失败');
  }
}

function copyLink(id) {
  const url = window.location.origin + '/invite.html?id=' + id;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('✅ 链接已复制'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 链接已复制');
  }
}

// ===== Scan =====
function openScan() {
  document.getElementById('scanOverlay').style.display = 'flex';
  document.getElementById('scanResult').style.display = 'none';
  startScan();
}
function closeScan() {
  stopScan();
  document.getElementById('scanOverlay').style.display = 'none';
}

function startScan() {
  if (html5Qrcode) {
    try { html5Qrcode.stop().catch(() => {}); } catch(e) {}
  }
  html5Qrcode = new Html5Qrcode('reader');
  const config = { fps: 15, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 };

  html5Qrcode.start(
    { facingMode: 'environment' },
    config,
    onScanSuccess,
    () => {}
  ).then(() => {
    scanning = true;
    try {
      const track = html5Qrcode.getRunningTrackCameraCapabilities();
      if (track && track.torchFeature && track.torchFeature.isSupported()) {
        track.torchFeature.enable(true).catch(() => {});
      }
    } catch(e) {}
  }).catch(err => {
    document.getElementById('scanResult').style.display = 'block';
    const el = document.getElementById('scanResult');
    el.className = 'error';
    el.textContent = '摄像头不可用，请使用手动输入';
  });
}

function stopScan() {
  if (html5Qrcode && scanning) {
    try { html5Qrcode.stop().catch(() => {}); } catch(e) {}
    scanning = false;
  }
}

async function onScanSuccess(decodedText) {
  stopScan();
  let inviteId = decodedText.trim();
  try {
    const urlObj = new URL(decodedText);
    const paramId = urlObj.searchParams.get('id');
    if (paramId) inviteId = paramId;
  } catch(e) {}
  if (!/^HJ[A-HJ-NP-Z2-9]{4}$/i.test(inviteId)) {
    const el = document.getElementById('scanResult');
    el.style.display = 'block';
    el.className = 'error';
    el.textContent = '✕ 无效邀请码格式';
    return;
  }
  await doVerify(inviteId);
}

async function manualVerify() {
  const id = document.getElementById('manualInput').value.trim().toUpperCase();
  if (!id) return showToast('请输入邀请码');
  await doVerify(id);
  document.getElementById('manualInput').value = '';
}

async function doVerify(inviteId) {
  const el = document.getElementById('scanResult');
  el.style.display = 'block';

  try {
    const invite = await redisGet('/get/invite:' + inviteId);

    if (!invite) {
      el.className = 'error';
      el.textContent = '✕ 无效邀请码，请检查后重试';
      return;
    }

    if (invite.used) {
      el.className = 'error';
      el.innerHTML = `✕ 该邀请函已核销<br><small style="opacity:.7">核销时间：${escHtml(invite.usedAt || '')}</small>`;
      return;
    }

    // Verify success
    invite.used = true;
    invite.usedAt = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
    await redisSet('invite:' + inviteId, invite);

    el.className = 'success';
    el.innerHTML = `✅ 核销成功！<br><strong style="font-size:18px;letter-spacing:3px">${escHtml(invite.name)}</strong> 可领取礼品`;

    refreshList();
  } catch(e) {
    console.error('[doVerify] error:', e);
    el.className = 'error';
    el.textContent = '网络错误，请重试';
  }
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
