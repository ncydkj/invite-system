<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金酱酒 · 邀请函系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#e8d5a8;--dark:#1a1208;--bg:#0f0a04;--card:#1e150a;--text:#f0e6d3;--muted:#8a7a62;--border:#3a2e1e}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.container{width:100%;max-width:360px;text-align:center}
.logo{font-size:42px;margin-bottom:8px}
.brand{font-size:18px;color:var(--gold);letter-spacing:6px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--muted);letter-spacing:3px;margin-bottom:36px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;text-align:left;transition:border-color .2s;cursor:pointer}
.card:hover{border-color:var(--gold)}
.card-emoji{font-size:28px;margin-bottom:8px}
.card h3{font-size:15px;color:var(--gold);margin-bottom:4px;font-weight:600}
.card p{font-size:12px;color:var(--muted);line-height:1.6}
.btn-card{display:block;text-decoration:none;color:inherit}
.footer{margin-top:32px;font-size:11px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🍷</div>
  <div class="brand">黄金酱酒</div>
  <div class="subtitle">流金之夜 · 品鉴会</div>

  <a class="btn-card" href="/admin.html">
    <div class="card">
      <div class="card-emoji">⚙️</div>
      <h3>管理后台</h3>
      <p>登录后生成邀请函、管理嘉宾、扫码核销</p>
    </div>
  </a>

  <a class="btn-card" href="/invite.html?id=demo">
    <div class="card">
      <div class="card-emoji">🎫</div>
      <h3>邀请函预览</h3>
      <p>查看邀请函样式（演示模式）</p>
    </div>
  </a>

  <div class="footer">— 邀请函管理系统 —</div>
</div>
</body>
</html>
